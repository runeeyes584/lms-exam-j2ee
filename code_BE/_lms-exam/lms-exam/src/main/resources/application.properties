spring.application.name=lms-exam

# Active profile (set to 'dev' for sample data seeding)
spring.profiles.active=dev

# MongoDB connection - prefer using an environment variable to avoid committing credentials
# Set MONGODB_URI in your environment instead of storing the secret here.
spring.data.mongodb.uri=${MONGODB_URI}

# Example (not recommended in source):
# spring.data.mongodb.uri=mongodb+srv://thuandeptrai123:123456789%2A@cluster0.050zlcd.mongodb.net/lms_exam?retryWrites=true&w=majority

# Windows CMD (temporary):
# set MONGODB_URI="mongodb+srv://user:pass@host/db?retryWrites=true&w=majority"
# PowerShell (temporary):
# $env:MONGODB_URI = "mongodb+srv://user:pass@host/db?retryWrites=true&w=majority"
