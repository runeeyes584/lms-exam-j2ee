name: Java CI with Maven

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package -DskipTests --file _lms-exam/lms-exam/pom.xml

    - name: Run tests
      run: mvn -B test --file _lms-exam/lms-exam/pom.xml
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Check code formatting
      run: mvn -B checkstyle:check --file _lms-exam/lms-exam/pom.xml || true
