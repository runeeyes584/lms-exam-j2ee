# UI-only profile: serve static frontend without requiring external services/env

# Disable Mongo auto-config + repositories
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
spring.data.mongodb.repositories.enabled=false

# Provide safe defaults to avoid placeholder failures if any bean references these
spring.data.mongodb.uri=mongodb://localhost:27017/examlms
spring.data.mongodb.database=examlms

jwt.secret=ui-only-dummy-secret
jwt.expiration=86400000

vnpay.tmnCode=UI_ONLY
vnpay.hashSecret=UI_ONLY
vnpay.payUrl=https://example.invalid/vnpay
vnpay.returnUrl=http://localhost:8080/
